<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHNSON AI — API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #12122a;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #a855f7;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a3a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #a855f7;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .success {
            background: #0a2a0a;
            border: 1px solid #2a5a2a;
            color: #4ade80;
            display: block !important;
        }

        .error {
            background: #2a0a0a;
            border: 1px solid #5a2a2a;
            color: #f87171;
            display: block !important;
        }

        .info {
            background: #0a0a2a;
            border: 1px solid #2a2a5a;
            color: #60a5fa;
            display: block !important;
        }

        .model-info {
            font-size: 11px;
            color: #666;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚡ JOHNSON AI — API Test</h1>
        <p>Yeh page test karega ki tumhara API key aur model sahi kaam kar raha hai</p>

        <label>Your Gemini API Key</label>
        <input type="text" id="apiKey" placeholder="Paste your Gemini API key here...">

        <label>Model</label>
        <select id="model">
            <option value="gemini-3.5-flash">gemini-3.5-flash (Stable - Recommended)</option>
            <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (Stable - Lite)</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash (Legacy)</option>
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (Legacy Lite)</option>
        </select>

        <p class="model-info">⬆️ Agar ek model kaam na kare toh doosra try karo</p>

        <button id="testBtn" onclick="testAPI()">🚀 Test API Connection</button>
        <button id="listBtn" onclick="listModels()" style="background: #1a1a3a; border: 1px solid #2a2a4a;">📋 List
            Available Models</button>

        <div id="status"></div>
    </div>

    <script>
        // Load saved key
        const savedKey = localStorage.getItem('johnson_ai_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        async function testAPI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('model').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('testBtn');

            if (!apiKey) {
                status.className = 'error';
                status.textContent = '❌ Please enter your API key first!';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Testing...';
            status.className = 'info';
            status.textContent = `🔄 Testing model: ${model}\n📡 Sending request...`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: 'Say "JOHNSON AI is working!" in one line.' }] }],
                        generationConfig: { temperature: 0.5, maxOutputTokens: 100 }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    status.className = 'error';
                    status.textContent = `❌ ERROR (${response.status}):\n${data.error?.message || JSON.stringify(data, null, 2)}\n\n💡 Solution: Try selecting a different model from the dropdown above.`;
                } else {
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                    status.className = 'success';
                    status.textContent = `✅ SUCCESS! Model "${model}" is working!\n\n🤖 AI Response: ${text}\n\n✅ Ab main app mein yeh model set kar doonga. Browser band karo aur index.html dobara kholo!`;

                    // Save the working model
                    localStorage.setItem('johnson_ai_api_key', apiKey);
                    localStorage.setItem('johnson_ai_working_model', model);
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = `❌ Network Error: ${err.message}\n\n💡 Check your internet connection.`;
            }

            btn.disabled = false;
            btn.textContent = '🚀 Test API Connection';
        }

        async function listModels() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('listBtn');

            if (!apiKey) {
                status.className = 'error';
                status.textContent = '❌ Please enter your API key first!';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Loading models...';
            status.className = 'info';
            status.textContent = '🔄 Fetching available models from Google...';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();

                if (!response.ok) {
                    status.className = 'error';
                    status.textContent = `❌ ERROR: ${data.error?.message || 'Failed to list models'}\n\n💡 Make sure your API key is valid.`;
                } else {
                    const models = data.models
                        ?.filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                        ?.map(m => m.name.replace('models/', ''))
                        ?.filter(m => m.includes('flash') || m.includes('pro'))
                        ?.slice(0, 15) || [];

                    status.className = 'success';
                    status.textContent = `✅ Available models that support generateContent:\n\n${models.map((m, i) => `${i + 1}. ${m}`).join('\n')}\n\n💡 Upar dropdown se koi model select karo aur "Test API" click karo.`;

                    // Auto-select first available flash model in dropdown
                    const select = document.getElementById('model');
                    for (let m of models) {
                        for (let opt of select.options) {
                            if (opt.value === m) {
                                opt.selected = true;
                                break;
                            }
                        }
                    }
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = `❌ Network Error: ${err.message}`;
            }

            btn.disabled = false;
            btn.textContent = '📋 List Available Models';
        }
    </script>
</body>

</html>
